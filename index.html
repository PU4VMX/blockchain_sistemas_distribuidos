<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Interaction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container my-5">
        <h1 class="text-center">Blockchain Interface</h1>
        <p class="text-center">Vinicius Marques S. Silva 0070356</p>

        <div class="row">
            <!-- Enviar Transação -->
            <div class="col-lg-6 col-md-12">
                <div class="card mb-3">
                    <div class="card-header">Enviar Transação</div>
                    <div class="card-body">
                        <form id="transactionForm">
                            <div class="mb-3">
                                <label for="sender" class="form-label">Sender:</label>
                                <input type="text" id="sender" name="sender" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="recipient" class="form-label">Recipient:</label>
                                <input type="text" id="recipient" name="recipient" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="amount" class="form-label">Amount:</label>
                                <input type="number" id="amount" name="amount" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Enviar Transação</button>
                        </form>
                        <p id="transactionMessage" class="mt-3 text-success"></p>
                    </div>
                </div>
            </div>

            <!-- Minerar Bloco -->
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header">Minerar Bloco</div>
                    <div class="card-body text-center">
                        <button id="mineButton" class="btn btn-success">Minerar</button>
                        <p id="mineMessage" class="mt-3 text-success"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Visualizar Cadeia -->
            <div class="col-md-12">
                <div class="card mb-3">
                    <div class="card-header">Visualizar Cadeia</div>
                    <div class="card-body">
                        <button id="chainButton" class="btn btn-info w-100">Obter Cadeia</button>
                    </div>
                </div>

                <!-- Tabela de Cadeia -->
                <div class="card mb-3">
                    <div class="card-header">Cadeia de Blocos</div>
                    <div class="card-body">
                        <table class="table table-bordered" id="chainTable">
                            <thead>
                                <tr>
                                    <th>Index</th>
                                    <th>Previous Hash</th>
                                    <th>Proof</th>
                                    <th>Timestamp</th>
                                    <th>Transactions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Os dados da cadeia serão adicionados aqui dinamicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Registrar Nó -->
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header">Registrar Nó</div>
                    <div class="card-body">
                        <form id="nodeForm">
                            <div class="mb-3">
                                <label for="nodePort" class="form-label">Porta do Nó:</label>
                                <input type="number" id="nodePort" name="nodePort" class="form-control" placeholder="5001" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Registrar Nó</button>
                        </form>
                        <p id="nodeMessage" class="mt-3 text-success"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabela de Nós Registrados -->
        <div class="row">
            <div class="col-md-12">
                <div class="card mb-3">
                    <div class="card-header">Nós Registrados</div>
                    <div class="card-body">
                        <table class="table table-bordered" id="nodesTable">
                            <thead>
                                <tr>
                                    <th>Porta do Nó</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Os nós serão adicionados aqui dinamicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = 'http://127.0.0.1:5000';

        // Enviar Transação
        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sender = document.getElementById('sender').value;
            const recipient = document.getElementById('recipient').value;
            const amount = parseFloat(document.getElementById('amount').value);

            try {
                const response = await fetch(`${apiUrl}/transactions/new`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender, recipient, amount })
                });
                const result = await response.json();
                document.getElementById('transactionMessage').textContent = result.message;
            } catch (error) {
                document.getElementById('transactionMessage').textContent = 'Erro ao enviar transação.';
            }
        });

        // Minerar Bloco
        document.getElementById('mineButton').addEventListener('click', async () => {
            try {
                const response = await fetch(`${apiUrl}/mine`);
                const result = await response.json();
                document.getElementById('mineMessage').textContent = result.message;
            } catch (error) {
                document.getElementById('mineMessage').textContent = 'Erro ao minerar bloco.';
            }
        });

        // Visualizar Cadeia
        document.getElementById('chainButton').addEventListener('click', async () => {
            try {
                const response = await fetch(`${apiUrl}/chain`);
                const result = await response.json();

                // Preencher a tabela com os dados da cadeia
                const chain = result.chain;
                const tableBody = document.querySelector('#chainTable tbody');
                tableBody.innerHTML = ''; // Limpar a tabela antes de adicionar novos dados

                chain.forEach(block => {
                    const row = document.createElement('tr');

                    // Adicionando dados do bloco
                    const indexCell = document.createElement('td');
                    indexCell.textContent = block.index;
                    row.appendChild(indexCell);

                    const previousHashCell = document.createElement('td');
                    previousHashCell.textContent = block.previous_hash;
                    row.appendChild(previousHashCell);

                    const proofCell = document.createElement('td');
                    proofCell.textContent = block.proof;
                    row.appendChild(proofCell);

                    const timestampCell = document.createElement('td');
                    timestampCell.textContent = new Date(block.timestamp * 1000).toLocaleString();
                    row.appendChild(timestampCell);

                    const transactionsCell = document.createElement('td');
                    transactionsCell.textContent = block.transactions.length > 0
                        ? block.transactions.map(tx => `${tx.sender} -> ${tx.recipient}: ${tx.amount}`).join(', ')
                        : 'Nenhuma transação';
                    row.appendChild(transactionsCell);

                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Erro ao obter cadeia de blocos:', error);
            }
        });

        // Registrar Nó
        document.getElementById('nodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nodePort = document.getElementById('nodePort').value;

            if (!nodePort) {
                document.getElementById('nodeMessage').textContent = 'Por favor, insira a porta do nó.';
                return;
            }

            const node = `http://127.0.0.1:${nodePort}`;

            try {
                const response = await fetch(`${apiUrl}/nodes/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nodes: [node] })
                });
                const result = await response.json();
                document.getElementById('nodeMessage').textContent = result.message;

                // Atualizar tabela com a lista de nós
                const nodes = result.total_nodes;
                const tableBody = document.querySelector('#nodesTable tbody');
                tableBody.innerHTML = ''; // Limpar a tabela antes de adicionar novos dados

                nodes.forEach(node => {
                    const row = document.createElement('tr');
                    const cell = document.createElement('td');
                    cell.textContent = node;
                    row.appendChild(cell);
                    tableBody.appendChild(row);
                });
            } catch (error) {
                document.getElementById('nodeMessage').textContent = 'Erro ao registrar nó.';
            }
        });
    </script>
</body>

</html>
